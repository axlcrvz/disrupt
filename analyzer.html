<div id="app-root" style="min-height:100vh;background:#0a0a0a;font-family:'Inter',system-ui,sans-serif;padding:32px 16px;">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700;800&display=swap');

  #app-root * { box-sizing:border-box; }
  .shell { max-width:520px; margin:0 auto; }

  .eyebrow { font-size:11px; letter-spacing:0.24em; color:#C6FF00; text-transform:uppercase; font-weight:800; text-align:center; }
  h1.title { font-family:'Bebas Neue',sans-serif; font-size:38px; color:#fff; text-align:center; margin:6px 0 4px; text-transform:uppercase; }
  p.sub { font-size:13px; color:#9c9c9c; text-align:center; margin:0 0 26px; }

  .dropzone {
    border:2px dashed #333; border-radius:14px; padding:36px 20px;
    text-align:center; cursor:pointer; transition:border-color 0.15s, background 0.15s;
    background:#111;
  }
  .dropzone.drag { border-color:#C6FF00; background:#141a05; }
  .dropzone .icon { font-size:28px; margin-bottom:10px; }
  .dropzone .main-txt { color:#fff; font-weight:700; font-size:14px; margin-bottom:4px; }
  .dropzone .sub-txt { color:#666; font-size:12px; }
  #fileInput { display:none; }

  .preview-card {
    background:#111; border:1px solid #222; border-radius:14px; padding:16px; margin-top:16px;
    display:flex; gap:14px; align-items:center;
  }
  .preview-card img { width:64px; height:64px; object-fit:cover; border-radius:8px; flex-shrink:0; }
  .preview-meta { flex:1; min-width:0; }
  .preview-meta .name { color:#fff; font-size:13px; font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .preview-meta .swap { color:#666; font-size:11px; cursor:pointer; text-decoration:underline; margin-top:2px; }

  .btn-primary {
    width:100%; margin-top:16px; background:#C6FF00; color:#0a0a0a; border:none;
    font-family:'Inter',sans-serif; font-weight:800; font-size:13px; letter-spacing:0.06em;
    padding:14px; border-radius:8px; cursor:pointer; text-transform:uppercase;
  }
  .btn-primary:disabled { opacity:0.4; cursor:default; }
  .btn-primary:hover:not(:disabled) { opacity:0.88; }

  .btn-ghost {
    width:100%; margin-top:10px; background:none; color:#9c9c9c; border:1px solid #333;
    font-family:'Inter',sans-serif; font-weight:600; font-size:12px;
    padding:11px; border-radius:8px; cursor:pointer;
  }
  .btn-ghost:hover { color:#C6FF00; border-color:#C6FF00; }

  .loading { text-align:center; padding:30px 0; color:#9c9c9c; font-size:13px; }
  .loading .spin {
    width:26px; height:26px; border:3px solid #222; border-top-color:#C6FF00; border-radius:50%;
    margin:0 auto 14px; animation:spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform:rotate(360deg); } }

  .error-box { background:#1a0f0f; border:1px solid #402020; color:#ff8a8a; font-size:12px; padding:12px 14px; border-radius:8px; margin-top:14px; }

  .results { margin-top:22px; }
  .score-row { display:flex; align-items:center; gap:14px; margin-bottom:18px; }
  .score-badge {
    font-family:'Bebas Neue',sans-serif; font-size:34px; color:#0a0a0a; background:#C6FF00;
    width:64px; height:64px; border-radius:50%; display:flex; align-items:center; justify-content:center; flex-shrink:0;
  }
  .score-label { color:#fff; font-weight:800; font-size:15px; text-transform:uppercase; letter-spacing:0.02em; }
  .score-format { color:#9c9c9c; font-size:12px; margin-top:2px; }

  .section { background:#111; border:1px solid #1e1e1e; border-radius:12px; padding:16px 18px; margin-bottom:12px; }
  .section-title { font-size:10px; letter-spacing:0.18em; color:#C6FF00; text-transform:uppercase; font-weight:800; margin-bottom:8px; }
  .section-body { color:#d4d4d4; font-size:13px; line-height:1.55; }

  ol.steps, ul.bullets { margin:0; padding-left:0; list-style:none; }
  ol.steps li, ul.bullets li {
    color:#d4d4d4; font-size:13px; line-height:1.5; margin-bottom:9px; padding-left:26px; position:relative;
  }
  ol.steps li:last-child, ul.bullets li:last-child { margin-bottom:0; }
  ol.steps { counter-reset:step; }
  ol.steps li::before {
    counter-increment:step; content:counter(step);
    position:absolute; left:0; top:0; width:18px; height:18px; border-radius:50%;
    background:#C6FF00; color:#0a0a0a; font-size:10px; font-weight:800;
    display:flex; align-items:center; justify-content:center;
  }
  ul.bullets li::before {
    content:'▸'; position:absolute; left:0; top:-1px; color:#C6FF00; font-size:13px;
  }

  .watchout { background:#161206; border:1px solid #332b0a; }
  .watchout .section-title { color:#e8c547; }
</style>

<div class="shell">
  <div class="eyebrow">We Disrupt Toolkit</div>
  <h1 class="title">Steal The Format</h1>
  <p class="sub">Upload a screenshot of any post or profile — get the breakdown and how to run it yourself.</p>

  <div id="dropzone" class="dropzone">
    <div class="icon">📸</div>
    <div class="main-txt">Drop a screenshot here</div>
    <div class="sub-txt">or click to browse — PNG / JPG</div>
    <input type="file" id="fileInput" accept="image/*">
  </div>

  <div id="previewArea"></div>
  <div id="actionArea"></div>
  <div id="statusArea"></div>
  <div id="resultsArea" class="results"></div>
</div>
</div>

<script>
(function(){
  const dropzone = document.getElementById('dropzone');
  const fileInput = document.getElementById('fileInput');
  const previewArea = document.getElementById('previewArea');
  const actionArea = document.getElementById('actionArea');
  const statusArea = document.getElementById('statusArea');
  const resultsArea = document.getElementById('resultsArea');

  let currentFile = null;
  let currentBase64 = null;
  let currentMediaType = null;

  dropzone.addEventListener('click', () => fileInput.click());
  dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('drag'); });
  dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag'));
  dropzone.addEventListener('drop', e => {
    e.preventDefault();
    dropzone.classList.remove('drag');
    if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
  });
  fileInput.addEventListener('change', e => {
    if (e.target.files.length) handleFile(e.target.files[0]);
  });

  function handleFile(file){
    if (!file.type.startsWith('image/')){
      statusArea.innerHTML = '<div class="error-box">That is not an image file — try a PNG or JPG screenshot.</div>';
      return;
    }
    currentFile = file;
    resultsArea.innerHTML = '';
    statusArea.innerHTML = '';

    const reader = new FileReader();
    reader.onload = () => {
      const result = reader.result;
      currentMediaType = file.type;
      currentBase64 = result.split(',')[1];
      renderPreview(result, file.name);
    };
    reader.readAsDataURL(file);
  }

  function renderPreview(dataUrl, name){
    previewArea.innerHTML = `
      <div class="preview-card">
        <img src="${dataUrl}" alt="preview">
        <div class="preview-meta">
          <div class="name">${escapeHtml(name)}</div>
          <div class="swap" id="swapBtn">choose a different screenshot</div>
        </div>
      </div>
    `;
    document.getElementById('swapBtn').addEventListener('click', () => fileInput.click());

    actionArea.innerHTML = `<button class="btn-primary" id="analyzeBtn">Analyze This Screenshot</button>`;
    document.getElementById('analyzeBtn').addEventListener('click', analyze);
  }

  function escapeHtml(str){
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  async function analyze(){
    statusArea.innerHTML = `
      <div class="loading">
        <div class="spin"></div>
        Breaking down the format…
      </div>`;
    resultsArea.innerHTML = '';
    actionArea.innerHTML = '';

    const prompt = `You are a short-form content strategist for a UGC agency. Look at this screenshot of a social media post or profile. Analyze it as a format worth studying and respond with ONLY a raw JSON object (no markdown fences, no preamble) with exactly these fields:

{
  "format_type": "short label for what kind of post/profile this is",
  "score": integer 1-10 rating how strong this format is to replicate,
  "hook": "one sentence on what grabs attention first, based on what's visible",
  "why_it_works": "2-3 sentences on the strategy behind it",
  "steal_the_format": ["4-5 short actionable steps a creator could follow to recreate this exact format for their own content"],
  "best_practices": ["3-4 short bullet points of general best practices this example demonstrates"],
  "watch_out_for": "1-2 sentences on any caveat, e.g. what NOT to copy blindly or what may not translate to other niches"
}

Base everything only on what's visibly in the image. Keep every field concise. Return ONLY the JSON object.`;

    try {
      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-6",
          max_tokens: 1000,
          messages: [
            {
              role: "user",
              content: [
                { type: "image", source: { type: "base64", media_type: currentMediaType, data: currentBase64 } },
                { type: "text", text: prompt }
              ]
            }
          ]
        })
      });

      const data = await response.json();
      const textBlocks = (data.content || []).filter(b => b.type === 'text').map(b => b.text);
      let raw = textBlocks.join('\\n').trim();
      raw = raw.replace(/^```json/i, '').replace(/^```/,'').replace(/```$/,'').trim();

      let parsed;
      try {
        parsed = JSON.parse(raw);
      } catch(e){
        throw new Error('Could not parse the analysis. Try again, or use a clearer screenshot.');
      }

      statusArea.innerHTML = '';
      renderResults(parsed);
      actionArea.innerHTML = `<button class="btn-ghost" id="resetBtn">Analyze Another Screenshot</button>`;
      document.getElementById('resetBtn').addEventListener('click', reset);

    } catch(err){
      statusArea.innerHTML = `<div class="error-box">Something went wrong: ${escapeHtml(err.message || 'please try again.')}</div>`;
      actionArea.innerHTML = `<button class="btn-primary" id="retryBtn">Try Again</button>`;
      document.getElementById('retryBtn').addEventListener('click', analyze);
    }
  }

  function renderResults(r){
    const steps = (r.steal_the_format || []).map(s => `<li>${escapeHtml(s)}</li>`).join('');
    const practices = (r.best_practices || []).map(s => `<li>${escapeHtml(s)}</li>`).join('');

    resultsArea.innerHTML = `
      <div class="score-row">
        <div class="score-badge">${escapeHtml(String(r.score ?? '–'))}</div>
        <div>
          <div class="score-label">${escapeHtml(r.format_type || 'Format Breakdown')}</div>
          <div class="score-format">Steal-worthiness score out of 10</div>
        </div>
      </div>

      <div class="section">
        <div class="section-title">The Hook</div>
        <div class="section-body">${escapeHtml(r.hook || '')}</div>
      </div>

      <div class="section">
        <div class="section-title">Why It Works</div>
        <div class="section-body">${escapeHtml(r.why_it_works || '')}</div>
      </div>

      <div class="section">
        <div class="section-title">Steal The Format</div>
        <ol class="steps">${steps}</ol>
      </div>

      <div class="section">
        <div class="section-title">Best Practices</div>
        <ul class="bullets">${practices}</ul>
      </div>

      ${r.watch_out_for ? `
      <div class="section watchout">
        <div class="section-title">Watch Out For</div>
        <div class="section-body">${escapeHtml(r.watch_out_for)}</div>
      </div>` : ''}
    `;
  }

  function reset(){
    currentFile = null; currentBase64 = null; currentMediaType = null;
    previewArea.innerHTML = '';
    actionArea.innerHTML = '';
    statusArea.innerHTML = '';
    resultsArea.innerHTML = '';
    fileInput.value = '';
  }
})();
</script>
